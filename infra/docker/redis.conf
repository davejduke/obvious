# ============================================================
# Redis 7.2 configuration for AIAUDITOR
# ============================================================

# Persistence: use AOF for durability (appendonly) + RDB snapshot as backup
appendonly yes
appendfsync everysec

# RDB snapshot every 60 seconds if at least 1 key changed
save 60 1

# Memory management
maxmemory 256mb
maxmemory-policy allkeys-lru

# Slow log threshold (microseconds)
slowlog-log-slower-than 10000
slowlog-max-len 128

# Keyspace notifications for cache invalidation events
# K = keyspace, E = keyevent, x = expired events
notify-keyspace-events "KExx"

# Bind to all interfaces (Docker internal — not exposed publicly)
bind 0.0.0.0

# Protected mode off inside Docker network
protected-mode no

# Log level
loglevel notice

# TCP keep-alive
tcp-keepalive 300
